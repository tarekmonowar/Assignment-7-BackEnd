name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # - name: Create .env file on EC2 or create manually in .env in ec2
      #   run: |
      #     ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cat > ~/app/.env << 'ENVEOF'
      #     PORT=${{ secrets.PORT }}
      #     CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
      #     EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}
      #     EMAIL_RECEIVER=${{ secrets.EMAIL_RECEIVER }}
      #     EMAIL_PASS=${{ secrets.EMAIL_PASS }}
      #     NODE_ENV=production
      #     DB_URL=${{ secrets.DB_URL }}
      #     CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
      #     CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
      #     CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
      #     JWT_SECRET=${{ secrets.JWT_SECRET }}
      #     JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
      #     ENVEOF"

      - name: Deploy files to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "mkdir -p ~/app"
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.github' \
            . ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/

      - name: Install dependencies & restart app on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Source fnm or nvm so node/npm/pm2 are in PATH
            export FNM_DIR="$HOME/.local/share/fnm"
            if [ -d "$FNM_DIR" ]; then
              export PATH="$FNM_DIR:$PATH"
              eval "$(fnm env)"
            fi

            # Fallback: try nvm
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            # Fallback: add common node paths
            export PATH="$HOME/.local/bin:$HOME/.npm-global/bin:/usr/local/bin:$PATH"

            cd ~/app

            echo "Node version: $(node -v)"
            echo "NPM version: $(npm -v)"

            npm ci --omit=dev

            # Restart with pm2
            pm2 delete node-app 2>/dev/null || true
            pm2 start dist/index.js --name node-app
            pm2 save

            # Enable pm2 to auto-start on EC2 reboot. ata protibar run korle duplicate pm2 process create hobe tai manually run kora lagbe akbar.
            # pm2 startup systemd -u $(whoami) --hp $HOME 2>/dev/null || true
            # sudo env PATH=$PATH:$(which node | xargs dirname) pm2 startup systemd -u $(whoami) --hp $HOME 2>/dev/null || true
            # pm2 save
          EOF

      # optional
      - name: Health check
        run: |
          echo "Waiting 10s for app to start..."
          sleep 10
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Node Environment setup
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "=== PM2 Status ==="
            pm2 status

            echo "=== Checking HTTP Endpoint ==="
            # curl diye check kora server 200 OK dicche ki na
            # --fail dile jodi status 400/500 hoy tobe script error dibe
            # -s (silent) jate extra info na ashe
            if curl -s --fail http://localhost:9092; then
              echo -e "\n✅ Health Check Passed: Server is responding!"
            else
              echo -e "\n❌ Health Check Failed: Server is NOT responding!"
              echo "=== Last 20 Error Logs ==="
              pm2 logs node-app --nostream --lines 20
              exit 1 # GitHub Action-ke 'Fail' mark korbe
            fi
          EOF
